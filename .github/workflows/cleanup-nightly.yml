name: Cleanup nightly releases

on:
  schedule:
    - cron: "25 6 * * *" # Daily nightly build at 6:25 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  attestations: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Prune old ghcr.io nightly images
        uses: dataaxiom/ghcr-cleanup-action@244b3e8a35c266981a44b7e35da0c0e6a29b48a0
        with:
          token: ${{ secrets.GHCR_TOKEN }}
          delete-tags: nightly-*
          older-than: 7 days
          delete-untagged: true

      - name: Prune orphaned GHCR attestation manifests
        uses: dataaxiom/ghcr-cleanup-action@244b3e8a35c266981a44b7e35da0c0e6a29b48a0
        with:
          token: ${{ secrets.GHCR_TOKEN }}
          package-name: memos-builds
          delete-tags: sha256-*
          older-than: 7 days

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Prune old nightly releases
        run: |
          cutoff_days=7
          cutoff_date=$(date -d "-${cutoff_days} days" +%Y%m%d)

          start_time=$(date +%s)

          readarray -t tags < <(gh release list --limit 100 --json tagName \
            --jq '.[] | select(.tagName | startswith("nightly-")) | select(.tagName[8:16] < "'"$cutoff_date"'") | .tagName')

          total=${#tags[@]}
          deleted=0
          declare -A tag_status

          for tag in "${tags[@]}"; do
            echo "Deleting release: $tag"
            if gh release delete "$tag" --yes --cleanup-tag; then
              deleted=$((deleted + 1))
              tag_status["$tag"]="✅ Deleted"
            else
              tag_status["$tag"]="❌ Failed"
            fi
          done

          end_time=$(date +%s)
          duration=$((end_time - start_time))

          {
            echo "---"
            echo "<h1>🧹 Nightly Release Cleanup Summary</h1>"
            echo "<h2>Overview</h2>"
            echo "<table><tr><th>Metric</th><th>Value</th></tr>"
            echo "<tr><td>Releases with tag age &gt;= ${cutoff_days} days</td><td>${total}</td></tr>"
            echo "<tr><td>Releases deleted</td><td>${deleted}</td></tr>"
            echo "<tr><td>Duration</td><td>${duration}s</td></tr>"
            echo "</table>"
            echo "<details><summary>Configuration</summary>"
            echo "<table><tr><th>Key</th><th>Value</th></tr>"
            echo "<tr><td>cutoff-days</td><td>${cutoff_days}</td></tr>"
            echo "<tr><td>cutoff-date</td><td>${cutoff_date}</td></tr>"
            echo "<tr><td>limit</td><td>100</td></tr>"
            echo "<tr><td>tag-pattern</td><td>nightly-*</td></tr>"
            echo "</table></details>"
            echo "<h2>Results</h2>"
            if [ "${total}" -eq 0 ]; then
              echo "<p>No old nightly releases found.</p>"
            else
              echo "<table><tr><th>Tag</th><th>Status</th></tr>"
              for tag in "${tags[@]}"; do
                echo "<tr><td>${tag}</td><td>${tag_status[$tag]}</td></tr>"
              done
              echo "</table>"
            fi
            echo "---"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prune old attestation records
        run: |
          cutoff_days=7
          cutoff_date=$(date -d "-${cutoff_days} days" +%Y-%m-%d)
          deleted=0
          max_pages=50  # Safety limit to prevent infinite loops

          page=1
          while [ $page -le $max_pages ]; do
            response=$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${{ github.repository }}/attestations?per_page=100&page=${page}" 2>/dev/null || echo '{}')

            # Safely extract count, default to 0 if null or missing
            count=$(echo "$response" | jq '.attestations // [] | length' 2>/dev/null || echo "0")

            # Ensure count is a valid integer
            if ! [[ "$count" =~ ^[0-9]+$ ]]; then
              echo "Invalid API response on page ${page}, stopping pagination"
              break
            fi

            if [ "$count" -eq 0 ]; then
              break
            fi

            # Extract attestation IDs older than cutoff
            mapfile -t old_attestations < <(echo "$response" | jq -r --arg cutoff "$cutoff_date" \
              '(.attestations // [])[] | select(.created_at < $cutoff) | .id' 2>/dev/null)

            # If no old attestations found on this page, check if we should continue
            if [ ${#old_attestations[@]} -eq 0 ]; then
              # All attestations on this page are newer than cutoff
              # Continue to next page to find older ones
              page=$((page + 1))
              continue
            fi

            for att_id in "${old_attestations[@]}"; do
              echo "Deleting attestation: ${att_id}"
              if gh api --method DELETE \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/${{ github.repository }}/attestations/${att_id}" 2>/dev/null; then
                deleted=$((deleted + 1))
              fi
            done

            # Don't increment page — deletions shift remaining items into this page.
            # Re-fetch the same page to catch shifted records.
          done

          if [ $page -gt $max_pages ]; then
            echo "Warning: Reached maximum page limit (${max_pages})"
          fi

          echo "### Attestation Cleanup" >> "$GITHUB_STEP_SUMMARY"
          echo "Deleted ${deleted} attestation records older than ${cutoff_days} days." >> "$GITHUB_STEP_SUMMARY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
