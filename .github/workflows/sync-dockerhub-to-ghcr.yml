name: Sync Docker Hub to GHCR

on:
  workflow_dispatch:
    inputs:
      source_image:
        description: Source image in Docker Hub (without tag)
        required: false
        type: string
        default: lincolnthalles/memos
      target_image:
        description: Target image in GHCR (without tag)
        required: false
        type: string
        default: ghcr.io/memospot/memos-builds
      start_after_tag:
        description: Start copying after this exact tag
        required: false
        type: string
        default: ""

jobs:
  sync-images:
    runs-on: ubuntu-24.04
    steps:
      - name: Install skopeo and jq
        run: sudo apt-get update && sudo apt-get install --yes skopeo jq

      - name: Login to Docker Hub
        env:
          DOCKERHUB_USERNAME: lincolnthalles
          DOCKERHUB_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DOCKERHUB_USERNAME:-}" ] || [ -z "${DOCKERHUB_TOKEN:-}" ]; then
            echo "DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is not set."
            exit 1
          fi
          printf '%s' "$DOCKERHUB_TOKEN" | skopeo login docker.io --username "$DOCKERHUB_USERNAME" --password-stdin

      - name: Login to GHCR
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GHCR_USERNAME:-}" ] || [ -z "${GHCR_TOKEN:-}" ]; then
            echo "GHCR_USERNAME or GHCR_TOKEN is not set."
            exit 1
          fi
          printf '%s' "$GHCR_TOKEN" | skopeo login ghcr.io --username "$GHCR_USERNAME" --password-stdin

      - name: Copy all tags from Docker Hub to GHCR
        env:
          SOURCE_IMAGE: ${{ inputs.source_image }}
          TARGET_IMAGE: ${{ inputs.target_image }}
          START_AFTER_TAG: ${{ inputs.start_after_tag }}
        run: |
          set -euo pipefail

          if [ -z "${SOURCE_IMAGE:-}" ] || [ -z "${TARGET_IMAGE:-}" ]; then
            echo "source_image and target_image are required."
            exit 1
          fi

          mapfile -t tags < <(skopeo list-tags "docker://docker.io/${SOURCE_IMAGE}" | jq -r '.Tags[]')

          if [ "${#tags[@]}" -eq 0 ]; then
            echo "No tags found for docker.io/${SOURCE_IMAGE}."
            exit 1
          fi

          start_copying=true
          found_start_tag=false

          if [ -n "${START_AFTER_TAG:-}" ]; then
            start_copying=false
            echo "Resuming after tag: ${START_AFTER_TAG}"
          fi

          for tag in "${tags[@]}"; do
            if [ "$start_copying" = false ]; then
              if [ "$tag" = "$START_AFTER_TAG" ]; then
                found_start_tag=true
                start_copying=true
              fi
              continue
            fi

            src="docker://docker.io/${SOURCE_IMAGE}:${tag}"
            dst="docker://${TARGET_IMAGE}:${tag}"
            echo "Copying ${src} -> ${dst}"
            skopeo copy --all "$src" "$dst"
          done

          if [ -n "${START_AFTER_TAG:-}" ] && [ "$found_start_tag" = false ]; then
            echo "start_after_tag '${START_AFTER_TAG}' was not found in source tags."
            exit 1
          fi
