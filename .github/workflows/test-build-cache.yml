name: Test build cache

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: "Platforms to build (empty for all)"
        required: false
        type: string
        default: ""
      version:
        description: "Version tag for testing"
        required: false
        type: string
        default: "nightly"

env:
  DAGGER_NO_NAG: "1"
  DO_NOT_TRACK: "1"

permissions:
  contents: read

jobs:
  test-cache-creation:
    name: Test build cache creation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Build with cache
        uses: memospot/action-dagger@ce84470b762a5673acd1099d5cde40bf4ac7a4a4 # v1.0.1
        with:
          cache-mode: direct
          version: latest
          verb: call
          args: >-
            build
            --source .
            --version ${{ inputs.version }}
            --platforms "${{ inputs.platforms }}"
        env:
          DAGGER_CLOUD_TOKEN: "${{ secrets.DAGGER_CLOUD_TOKEN }}"

      - name: Report cache status
        run: |
          echo "Build completed."
          echo ""

  test-usage:
    needs: test-cache-creation
    name: Test build cache usage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Build with cache
        uses: memospot/action-dagger@ce84470b762a5673acd1099d5cde40bf4ac7a4a4 # v1.0.1
        with:
          cache-mode: direct
          version: latest
          verb: call
          args: >-
            build
            --source .
            --version ${{ inputs.version }}
            --platforms "${{ inputs.platforms }}"
        env:
          DAGGER_CLOUD_TOKEN: "${{ secrets.DAGGER_CLOUD_TOKEN }}"

      - name: Report cache status
        run: |
          echo "Build completed."
          echo ""
