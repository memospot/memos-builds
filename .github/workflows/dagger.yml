name: Build and Release (Dagger)

on:
  schedule:
    - cron: "25 7 * * *" # Daily nightly build at 7:25 AM UTC
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      version:
        description: |
          Version tag to build (e.g., v0.25.3)
          Leave empty for nightly build from main branch.
        required: false
        type: string
      publish-containers:
        description: "Publish containers to registries"
        required: false
        type: boolean
        default: true

env:
  DAGGER_NO_NAG: "1"
  DO_NOT_TRACK: "1"

permissions:
  contents: read

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
      actions: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Determine version
        id: version
        run: |
          if [[ "${{ inputs.version }}" == v* || "${{ inputs.version }}" =~ ^nightly-[0-9]{8}-[0-9a-fA-F]{7}$ ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${{ github.ref_name }}" == v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            MEMOS_SHA="$(git ls-remote https://github.com/usememos/memos.git refs/heads/main | cut -c1-7)"
            if [[ -z "$MEMOS_SHA" ]]; then
              echo "Failed to resolve usememos/memos main branch SHA" >&2
              exit 1
            fi
            VERSION="nightly-$(date -u +%Y%m%d)-${MEMOS_SHA}"
          fi

          if [[ "$VERSION" == v* ]]; then
            CONTAINER_TAG="${VERSION#v}"
          else
            CONTAINER_TAG="$VERSION"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "container_tag=$CONTAINER_TAG" >> "$GITHUB_OUTPUT"

      - name: Determine publish args
        id: publish
        run: |
          HAS_DOCKER="${{ secrets.DOCKER_TOKEN != '' }}"
          HAS_GHCR="${{ secrets.GHCR_TOKEN != '' }}"

          if ([ "${{ inputs.publish-containers }}" = "true" ] && [ "$HAS_DOCKER" = "true" ] && [ "$HAS_GHCR" = "true" ]) || \
              [ "${{ github.event_name }}" = "push" ] || \
              [ "${{ github.event_name }}" = "schedule" ]; then
            echo "args=--docker-hub-user lincolnthalles --docker-hub-password env:DOCKER_TOKEN --ghcr-user ${{ github.actor }} --ghcr-password env:GHCR_TOKEN" >> $GITHUB_OUTPUT
          else
            echo "args=" >> $GITHUB_OUTPUT
          fi

      - name: Build release artifacts
        uses: memospot/action-dagger@ce84470b762a5673acd1099d5cde40bf4ac7a4a4 # v1.0.1
        with:
          version: latest
          verb: call
          args: >-
            publish
            --source .
            --version ${{ steps.version.outputs.version }}
            ${{ steps.publish.outputs.args }}
            export --path ./dist
        env:
          DAGGER_CLOUD_TOKEN: "${{ secrets.DAGGER_CLOUD_TOKEN }}"
          DOCKER_TOKEN: "${{ secrets.DOCKER_TOKEN }}"
          GHCR_TOKEN: "${{ secrets.GHCR_TOKEN }}"

      - name: List build artifacts
        run: ls -la ./dist

      - name: Create GitHub Release
        if: startsWith(steps.version.outputs.version, 'v')
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body: |
            Built from [usememos/memos@${{ steps.version.outputs.version }}](https://github.com/usememos/memos/releases/tag/${{ steps.version.outputs.version }})

            ---
            ```bash
            docker pull ghcr.io/memospot/memos-builds:${{ steps.version.outputs.container_tag }}
            ```
            ```bash
            docker pull docker.io/lincolnthalles/memos:${{ steps.version.outputs.container_tag }}
            ```
          files: ./dist/*
          fail_on_unmatched_files: true
          generate_release_notes: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Nightly Release
        if: "!startsWith(steps.version.outputs.version, 'v') || contains(steps.version.outputs.version, 'nightly')"
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body: |
            Built from [usememos/memos@main](https://github.com/usememos/memos/commits/main/).

            > [!WARNING]
            > **This is an automated development build and may be unstable, or may not even run at all.**

            > [!CAUTION]
            > Ensure that you use a different database from the one you use for stable releases.

            > [!NOTE]
            > - Nightly assets use an out-of-tree date-based semantic version (for example, `v2026.5.6-nightly+bcbcb03`).

            ---

            ## Docker

            ### Starting a throwaway instance
            No data persistence, everything gets deleted when the container is stopped.

            ```bash
            docker run --detach --rm --name memos-${{ steps.version.outputs.container_tag }}-throwaway --publish 5232:5230 \
              --env MEMOS_DEMO=true ghcr.io/memospot/memos-builds:${{ steps.version.outputs.container_tag }}
            ```
            The container should be accessible at <http://localhost:5232/>.

            ### Stopping the instance
            ```bash
            docker stop memos-${{ steps.version.outputs.container_tag }}-throwaway
            ```

          files: ./dist/*
          fail_on_unmatched_files: true
          generate_release_notes: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
