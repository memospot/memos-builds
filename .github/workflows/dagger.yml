name: Build and Release (Dagger)

on:
  schedule:
    - cron: "25 7 * * *" # Daily nightly build at 7:25 AM UTC
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      version:
        description: |
          Version tag to build (e.g., v0.25.3)
          Leave empty for nightly build from main branch.
        required: false
        type: string
      publish-containers:
        description: "Publish containers to registries"
        required: false
        type: boolean
        default: true

env:
  DAGGER_NO_NAG: "1"
  DO_NOT_TRACK: "1"

permissions:
  contents: read

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
      actions: write
      id-token: write
      attestations: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Determine version
        id: version
        run: |
          if [[ "${INPUTS_VERSION}" == v* || "${INPUTS_VERSION}" =~ ^nightly-[0-9]{8}-[0-9a-fA-F]{7}$ ]]; then
            VERSION="${INPUTS_VERSION}"
          elif [[ "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            MEMOS_SHA="$(git ls-remote https://github.com/usememos/memos.git refs/heads/main | cut -c1-7)"
            if [[ -z "$MEMOS_SHA" ]]; then
              echo "Failed to resolve usememos/memos main branch SHA" >&2
              exit 1
            fi
            VERSION="nightly-$(date -u +%Y%m%d)-${MEMOS_SHA}"
          fi

          if [[ "$VERSION" == v* ]]; then
            CONTAINER_TAG="${VERSION#v}"
          else
            CONTAINER_TAG="$VERSION"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "container_tag=$CONTAINER_TAG" >> "$GITHUB_OUTPUT"
        env:
          INPUTS_VERSION: ${{ inputs.version }}

      - name: Determine publish args
        id: publish
        run: |
          HAS_DOCKER="${{ secrets.DOCKER_TOKEN != '' }}"
          HAS_GHCR="${{ secrets.GHCR_TOKEN != '' }}"

          if ([ "${{ inputs.publish-containers }}" = "true" ] && [ "$HAS_DOCKER" = "true" ] && [ "$HAS_GHCR" = "true" ]) || \
              [ "${{ github.event_name }}" = "push" ] || \
              [ "${{ github.event_name }}" = "schedule" ]; then
            echo "args=--docker-hub-user lincolnthalles --docker-hub-password env:DOCKER_TOKEN --ghcr-user ${GITHUB_ACTOR} --ghcr-password env:GHCR_TOKEN" >> $GITHUB_OUTPUT
          else
            echo "args=" >> $GITHUB_OUTPUT
          fi

      - name: Build release artifacts
        uses: memospot/action-dagger@ce84470b762a5673acd1099d5cde40bf4ac7a4a4 # v1.0.1
        with:
          version: latest
          verb: call
          args: >-
            publish
            --source .
            --version ${{ steps.version.outputs.version }}
            ${{ steps.publish.outputs.args }}
            export --path ./dist
        env:
          DAGGER_CLOUD_TOKEN: "${{ secrets.DAGGER_CLOUD_TOKEN }}"
          DOCKER_TOKEN: "${{ secrets.DOCKER_TOKEN }}"
          GHCR_TOKEN: "${{ secrets.GHCR_TOKEN }}"

      - name: List build artifacts
        run: ls -la ./dist

      - name: Attest binary artifacts
        uses: actions/attest@v4
        with:
          subject-path: "./dist/*"

      - name: Get GHCR image digest
        id: container-digest
        if: steps.publish.outputs.args != ''
        run: |
          DIGEST=$(jq -r '.[] | select(.registry | startswith("ghcr.io")) | .digest' ./dist/container-digests.json | head -1)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest container image
        if: steps.container-digest.outputs.digest != ''
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/memospot/memos-builds
          subject-digest: ${{ steps.container-digest.outputs.digest }}
          push-to-registry: true

      - name: Create GitHub Release
        if: startsWith(steps.version.outputs.version, 'v')
        run: |
          cat <<'NOTES' > /tmp/release-notes.md
          Built from [usememos/memos@${VERSION}](https://github.com/usememos/memos/releases/tag/${VERSION})

          ---
          ```bash
          docker pull ghcr.io/memospot/memos-builds:${CONTAINER_TAG}
          ```
          ```bash
          docker pull docker.io/lincolnthalles/memos:${CONTAINER_TAG}
          ```
          NOTES
          gh release create "${VERSION}" ./dist/* \
            --title "${VERSION}" \
            --latest \
            --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          CONTAINER_TAG: ${{ steps.version.outputs.container_tag }}

      - name: Create Nightly Release
        if: "!startsWith(steps.version.outputs.version, 'v') || contains(steps.version.outputs.version, 'nightly')"
        run: |
          cat <<'NOTES' > /tmp/release-notes.md
          Built from [usememos/memos@main](https://github.com/usememos/memos/commits/main/).

          > [!WARNING]
          > **This is an automated development build and may be unstable, or may not even run at all.**

          > [!CAUTION]
          > Ensure that you use a different database from the one you use for stable releases.

          > [!NOTE]
          > Nightly assets use an out-of-tree date-based semantic version (for example, `v2026.5.6-nightly+bcbcb03`).

          ---

          ## Docker

          ### Starting a throwaway instance
          No data persistence, everything gets deleted when the container is stopped.

          ```bash
          docker run --detach --rm --name memos-${CONTAINER_TAG}-throwaway --publish 5232:5230 \
            --env MEMOS_DEMO=true ghcr.io/memospot/memos-builds:${CONTAINER_TAG}
          ```
          The container should be accessible at <http://localhost:5232/>.

          ### Stopping the instance
          ```bash
          docker stop memos-${CONTAINER_TAG}-throwaway
          ```
          NOTES
          gh release create "${VERSION}" ./dist/* \
            --title "${VERSION}" \
            --prerelease \
            --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONTAINER_TAG: ${{ steps.version.outputs.container_tag }}
          VERSION: ${{ steps.version.outputs.version }}
